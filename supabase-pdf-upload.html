<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase PDF Upload - Notes Bucket</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-8">
  <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-8 space-y-6">
    <div class="text-center">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
        PDF Upload to Supabase
      </h1>
      <p class="text-gray-600 mt-2">Bucket: <strong>"note"</strong> | Max 50MB</p>
    </div>

    <div class="border-2 border-dashed border-gray-300 rounded-2xl p-8 text-center hover:border-blue-400 transition-all">
      <input type="file" id="pdfFile" accept="application/pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
      <div class="space-y-4">
        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <div>
          <p class="text-lg font-medium text-gray-900" id="fileName">Choose PDF file</p>
          <p class="text-sm text-gray-500">Click or drag PDF (max 50MB)</p>
        </div>
      </div>
    </div>

    <button id="uploadBtn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 px-6 rounded-xl font-semibold hover:from-blue-700 hover:to-purple-700 transition-all shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
      Upload PDF
    </button>

    <div id="message" class="hidden p-4 rounded-xl font-medium text-center"></div>

    <div id="publicUrl" class="hidden p-4 bg-green-50 border border-green-200 rounded-xl">
      <p class="font-semibold text-green-800 mb-2">✅ Upload Success!</p>
      <a id="urlLink" href="#" target="_blank" class="text-blue-600 hover:text-blue-800 font-mono text-sm break-all block"></a>
    </div>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = 'YOUR_SUPABASE_URL'; // Replace with your URL
      const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY'; // Replace with your anon key

      const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const fileInput = document.getElementById('pdfFile');
      const uploadBtn = document.getElementById('uploadBtn');
      const fileNameEl = document.getElementById('fileName');
      const messageEl = document.getElementById('message');
      const publicUrlEl = document.getElementById('publicUrl');
      const urlLink = document.getElementById('urlLink');

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          if (file.type !== 'application/pdf') {
            showMessage('Only PDF files allowed!', 'error');
            fileInput.value = '';
            return;
          }
          if (file.size > 50 * 1024 * 1024) {
            showMessage('File too large! Max 50MB', 'error');
            fileInput.value = '';
            return;
          }
          fileNameEl.textContent = file.name;
          uploadBtn.disabled = false;
        }
      });

      uploadBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return;

        uploadBtn.disabled = true;
        uploadBtn.textContent = 'Uploading...';
        showMessage('', '');

        try {
          // Generate unique filename with timestamp
          const timestamp = Date.now();
          const fileExt = file.name.split('.').pop();
          const fileName = `${timestamp}-${crypto.randomUUID().slice(0,8)}.${fileExt}`;

          // Upload to 'note' bucket
          const { data, error } = await supabase.storage
            .from('note')
            .upload(fileName, file, {
              contentType: 'application/pdf',
              upsert: false
            });

          if (error) throw error;

          // Get public URL
          const { data: { publicUrl } } = supabase.storage
            .from('note')
            .getPublicUrl(fileName);

          showSuccess(publicUrl);
          console.log('Upload success:', publicUrl);
        } catch (error) {
          console.error('Upload error:', error);
          showMessage('Upload failed: ' + (error.message || error.error_description || 'Unknown error'), 'error');
        } finally {
          uploadBtn.disabled = false;
          uploadBtn.textContent = 'Upload PDF';
        }
      });

      function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = `p-4 rounded-xl font-medium text-center ${type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : ''}`;
        messageEl.classList.remove('hidden');
        publicUrlEl.classList.add('hidden');
        setTimeout(() => messageEl.classList.add('hidden'), 5000);
      }

      function showSuccess(url) {
        messageEl.classList.add('hidden');
        urlLink.href = url;
        urlLink.textContent = url;
        publicUrlEl.classList.remove('hidden');
      }
    </script>
  </div>
</body>
</html>
